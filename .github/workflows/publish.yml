name: Publish to PyPI

# Publica via Trusted Publishing (OIDC) — sem token armazenado no repositório.
# Dispara ao empurrar uma tag v*, ou manualmente pela aba Actions.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build e testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install -e ".[dev]"

      - name: Rodar testes
        run: python -m pytest tests/ -q

      - name: Validar conformidade OKF
        run: okam validate

      - name: Conferir se a tag casa com a versão do pacote
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import okam; print(okam.__version__)")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag ($TAG) diverge da versão do pacote ($PKG)."
            exit 1
          fi
          echo "Tag e versão conferem: $PKG"

      - name: Build da distribuição
        run: python -m build

      - name: Verificar metadados
        run: |
          pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publicar no PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/okam
    permissions:
      id-token: write # obrigatório para Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publicar no PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
